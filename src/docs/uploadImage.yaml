paths:
  /uploadImage:
    post:
      tags:
        - UploadImage
      summary: Upload an image
      description: Uploads an image to Cloudinary and returns the public ID and URL.
      produces:
        - application/json
      requestBody:
        required: true
        description: Provide the image file to upload.
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: The file to upload.
      responses:
        200:
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
              example:
                url: https://res.cloudinary.com/demo/image/upload/v1234567890/sample.jpg
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                  code:
                    type: string
                  message:
                    type: string
              example:
                status: 400
                code: 'NO_FILE_UPLOADED'
                message: 'No file was uploaded.'
