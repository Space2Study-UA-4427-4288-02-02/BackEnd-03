paths:
  /locations/countries:
    get:
      summary: Get all countries
      tags: [Locations]
      responses:
        '200':
          description: List of countries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    iso2:
                      type: string
                      example: UA
                    name:
                      type: string
                      example: Ukraine

  /locations/countries/{countryCode}/cities:
    get:
      summary: Get cities by country
      tags: [Locations]
      parameters:
        - in: path
          name: countryCode
          required: true
          schema:
            type: string
            example: UA
      responses:
        '200':
          description: List of cities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      example: LVI
                    name:
                      type: string
                      example: Lviv